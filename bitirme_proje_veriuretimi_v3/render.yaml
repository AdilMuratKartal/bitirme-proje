# render.yaml — Tek Repo, Iki Servis, Standard Tier
# rootDir: render_backend → Render sadece bu dizini build eder
# PYTHONPATH: "." → render_backend/ kokunden tum importlar calisir

services:

  # ── HOT PATH — FastAPI Web Service ──────────────────────────────
  - type: web
    name: learning-insight-api
    env: python
    plan: standard                 # 2 GB RAM, always-on, sabit aylik
    rootDir: bitirme_proje_veriuretimi_v3/render_backend
    buildCommand: pip install -r requirements_cpu.txt
    startCommand: "gunicorn api_gateway_orchestration.api.api:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --timeout 60 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false                # Dashboard'dan inject et (?sslmode=require ekli)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CONFIG_STR
        sync: false                # Firebase service account JSON tek satir string
      - key: PYTHONPATH
        value: "."
      - key: PYTHON_VERSION
        value: "3.10.11"

  # COLD PATH (haftalik batch cron) KALDIRILDI — dash-only mimaride risk
  # degerleri offline (localv2 + student_success modeli) hesaplanip dash_risk
  # tablosuna yazilir; canli predict / mdl_* erisimi yok.