# render.yaml — Tek Repo, İki Servis
# Web Service (Hot Path) + Cron Job (Cold Path)
# render_backend/ dizini her iki servis için rootDir'dir.

services:

  # ── HOT PATH — FastAPI Web Service ──────────────────────────────
  - type: web
    name: learning-insight-api
    env: python
    plan: standard                  # $25/ay, 2GB RAM — TF + on-demand predict için
    rootDir: render_backend
    buildCommand: pip install -r requirements_cpu.txt
    startCommand: >
      gunicorn api_gateway_orchestration.api.api:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --timeout 60
      --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false                 # Render dashboard'dan inject et
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: PYTHONPATH
        value: "."
      - key: PYTHON_VERSION
        value: "3.10.11"

  # ── COLD PATH — Haftalık Batch Cron Job ─────────────────────────
  - type: cron
    name: learning-insight-weekly-batch
    env: python
    plan: standard                  # 2GB RAM — TF + 10K öğrenci batch için
    rootDir: render_backend
    schedule: "0 2 * * 1"          # Her Pazartesi 02:00 UTC
    buildCommand: pip install -r requirements_cpu.txt
    command: python -m api_gateway_orchestration.orchestration.weekly_batch
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONPATH
        value: "."
      - key: PYTHON_VERSION
        value: "3.10.11"
